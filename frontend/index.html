<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VaakSetu — AI-powered multilingual assistant for Karnataka's 1092 helpline">
  <title>VaakSetu — 1092 Helpline Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/AgentDashboard.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-card: #161b22;
      --bg-input: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent-blue: #58a6ff;
      --accent-green: #3fb950;
      --accent-red: #f85149;
      --accent-orange: #f0883e;
      --accent-purple: #bc8cff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Top Header ──────────────────────────────────────── */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: linear-gradient(135deg, #161b22 0%, #1a2332 100%);
      border-bottom: 1px solid var(--border);
    }
    .app-header h1 {
      font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .app-header .subtitle { font-size: 0.8rem; color: var(--text-secondary); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Split Layout ────────────────────────────────────── */
    .demo-layout {
      display: flex; height: calc(100vh - 52px);
    }

    /* ── Left: Citizen Panel ─────────────────────────────── */
    .citizen-panel {
      width: 420px; min-width: 380px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      background: var(--bg-card);
    }

    /* Speech Panel Styles */
    .speech-panel { padding: 16px; flex: 1; overflow-y: auto; }
    .speech-panel h2 {
      font-size: 1rem; margin-bottom: 16px; color: var(--accent-blue);
    }
    .speech-controls {
      display: flex; flex-wrap: wrap; gap: 8px;
      align-items: center; margin-bottom: 12px;
    }
    .lang-select-wrap {
      display: flex; align-items: center; gap: 6px;
    }
    .lang-select-wrap label { font-size: 0.8rem; color: var(--text-secondary); }
    .lang-select-wrap select, #text-input {
      background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text-primary); border-radius: 6px;
      padding: 6px 10px; font-size: 0.85rem; font-family: inherit;
    }

    .btn {
      border: none; border-radius: 6px; padding: 8px 16px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-green { background: #238636; color: #fff; }
    .btn-green:hover:not(:disabled) { background: #2ea043; }
    .btn-red { background: #da3633; color: #fff; }
    .btn-red:hover:not(:disabled) { background: #f85149; }
    .btn-blue { background: #1f6feb; color: #fff; }
    .btn-blue:hover:not(:disabled) { background: #388bfd; }
    .btn-mic {
      background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border); min-width: 140px;
    }
    .btn-mic:hover:not(:disabled) { border-color: var(--accent-blue); }
    .btn-mic.listening {
      background: #da3633; color: #fff; border-color: transparent;
      animation: micPulse 1.5s infinite;
    }
    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(218,54,51,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(218,54,51,0); }
    }

    .speech-status {
      font-size: 0.82rem; padding: 8px 12px; border-radius: 6px;
      margin-bottom: 12px; background: var(--bg-input);
    }
    .status-success { color: var(--accent-green); }
    .status-error   { color: var(--accent-red); }
    .status-warn    { color: var(--accent-orange); }
    .status-info    { color: var(--text-secondary); }
    .status-listening { color: var(--accent-red); font-weight: 600; }

    .transcript-area {
      background: var(--bg-input); border-radius: 8px;
      padding: 16px; min-height: 80px; margin-bottom: 12px;
      font-size: 0.9rem; line-height: 1.5;
    }
    .transcript-placeholder { color: var(--text-secondary); font-style: italic; }
    .transcript.interim { color: var(--text-secondary); }
    .transcript.final { color: var(--text-primary); }

    .restatement-area {
      background: var(--bg-input); border-radius: 8px;
      padding: 16px; margin-bottom: 12px;
      border-left: 3px solid var(--accent-blue);
    }
    .restatement-area h3 {
      font-size: 0.8rem; color: var(--accent-blue); margin-bottom: 8px;
    }
    .restatement-area p {
      font-size: 0.9rem; margin-bottom: 10px; line-height: 1.4;
    }
    .confidence-bar {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .confidence-bar { height: 6px; flex: 1; background: var(--border);
      border-radius: 3px; overflow: hidden; position: relative; }
    .confidence-fill {
      height: 100%; background: var(--accent-green); border-radius: 3px;
      transition: width 0.3s;
    }
    .confidence-bar span {
      position: absolute; right: -40px; top: -6px;
      font-size: 0.72rem; color: var(--text-secondary); width: 35px;
    }
    .verify-buttons { display: flex; gap: 8px; }

    .routing-result {
      background: #0d2818; border: 1px solid #238636;
      border-radius: 8px; padding: 16px; margin-bottom: 12px;
    }
    .routing-result h3 { color: var(--accent-green); font-size: 0.85rem; }
    .routing-result p { font-size: 1rem; font-weight: 600; }

    .text-input-area {
      display: flex; gap: 8px; padding: 12px 0 0;
      border-top: 1px solid var(--border);
    }
    #text-input { flex: 1; }

    /* Right: Agent Dashboard */
    .agent-panel {
      flex: 1; overflow-y: auto; background: var(--bg-primary);
    }
    .agent-panel .dashboard { height: 100%; transition: all 0.3s; border: 1px solid transparent; }

    @keyframes redAlertPulse {
      0% { box-shadow: inset 0 0 0px rgba(248,81,73,0); }
      50% { box-shadow: inset 0 0 120px rgba(248,81,73,0.3); }
      100% { box-shadow: inset 0 0 0px rgba(248,81,73,0); }
    }
    .critical-pulse {
      animation: redAlertPulse 1.5s infinite !important;
      border-color: rgba(248,81,73,0.5) !important;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div>
      <h1>⚡ VaakSetu</h1>
      <div class="subtitle">AI-Powered 1092 Helpline Assistant — Karnataka</div>
    </div>
    <div class="header-right">
      <div class="live-dot"></div>
      <span style="font-size:0.8rem; color: var(--text-secondary);">Demo Mode</span>
    </div>
  </header>

  <div class="demo-layout">
    <!-- Left: Citizen mic panel -->
    <div class="citizen-panel">
      <div id="speech-container"></div>
    </div>

    <!-- Right: Agent dashboard (simplified inline version) -->
    <div class="agent-panel">
      <div id="agent-dashboard" class="dashboard">
        <div style="padding: 20px;">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
            <h2 style="color: var(--accent-blue); font-size:1.1rem;">Agent Dashboard</h2>
            <div id="ws-status" style="font-size:0.8rem; color: var(--accent-green);">● Connected</div>
          </div>

          <!-- Active Calls -->
          <div style="background:var(--bg-card); border-radius:8px; padding:16px; margin-bottom:16px;">
            <h3 style="font-size:0.85rem; color:var(--text-secondary); text-transform:uppercase; margin-bottom:12px;">Active Calls</h3>
            <div id="call-list" style="font-size:0.85rem; color:var(--text-secondary);">No active calls</div>
          </div>

          <!-- Live Session -->
          <div id="live-session" style="display:none;">
            <div style="background:var(--bg-card); border-radius:8px; padding:16px; margin-bottom:16px;">
              <h3 style="font-size:0.85rem; color:var(--text-secondary); text-transform:uppercase; margin-bottom:12px;">Emotion State</h3>
              <div id="emotion-display" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
            </div>

            <div style="background:var(--bg-card); border-radius:8px; padding:16px; margin-bottom:16px;">
              <h3 style="font-size:0.85rem; color:var(--text-secondary); text-transform:uppercase; margin-bottom:12px;">Understanding</h3>
              <div id="nlu-display"></div>
            </div>

            <div style="background:var(--bg-card); border-radius:8px; padding:16px; margin-bottom:16px;">
              <h3 style="font-size:0.85rem; color:var(--text-secondary); text-transform:uppercase; margin-bottom:12px;">Conversation</h3>
              <div id="turns-display" style="max-height:200px; overflow-y:auto;"></div>
            </div>
          </div>

          <!-- Escalation Banner -->
          <div id="escalation-banner" style="display:none; background:var(--accent-red); color:#fff; padding:12px 16px; border-radius:8px; margin-bottom:16px; font-weight:600;">
            ⚠ Escalation Alert
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/frontend/SpeechInput.js"></script>
  <script>
    // ── Initialize Speech Input ─────────────────────────────────
    const speechInput = new VaakSetuSpeechInput('speech-container');

    // ── SocketIO Dashboard ──────────────────────────────────────
    const socket = io(window.location.origin, { transports: ['websocket', 'polling'] });

    const EMOTION_COLORS = {
      distress: '#e74c3c', urgency: '#f39c12',
      anger: '#c0392b', fear: '#6b21a8', confusion: '#8e44ad',
    };

    socket.on('connect', () => {
      document.getElementById('ws-status').innerHTML = '● Connected';
      document.getElementById('ws-status').style.color = '#3fb950';
    });
    socket.on('disconnect', () => {
      document.getElementById('ws-status').innerHTML = '○ Disconnected';
      document.getElementById('ws-status').style.color = '#f85149';
    });

    socket.on('session_update', (data) => {
      updateDashboard(data);
    });

    socket.on('escalation_alert', (data) => {
      const banner = document.getElementById('escalation-banner');
      banner.style.display = 'block';
      banner.textContent = `⚠ ESCALATION: ${data.reason} — Call ${data.call_id}`;
      document.getElementById('agent-dashboard').classList.add('critical-pulse');
      // Auto-join room
      socket.emit('join_room', { call_id: data.call_id });
    });

    socket.on('session_closed', ({ call_id }) => {
      document.getElementById('live-session').style.display = 'none';
      document.getElementById('call-list').textContent = 'Call ended';
    });

    function updateDashboard(data) {
      // Toggle Critical Pulse Animation
      const dashboardPanel = document.getElementById('agent-dashboard');
      if (data.priority === 'critical' || (data.distress_score && data.distress_score > 0.75)) {
        dashboardPanel.classList.add('critical-pulse');
      } else {
        dashboardPanel.classList.remove('critical-pulse');
      }

      // Show call in list
      const callList = document.getElementById('call-list');
      // BUG-26: Use data-call-id attribute + addEventListener instead of
      // inline onclick interpolation — call_id could contain JS if BUG-24
      // validation is bypassed.
      const card = document.createElement('div');
      card.style.cssText = 'padding:8px; background:#21262d; border-radius:6px; cursor:pointer;';
      card.dataset.callId = data.call_id;
      card.innerHTML = `
        <strong>${data.call_id.replace(/[<>&"]/g, '')}</strong>
        <span style="color:#8b949e; margin-left:8px;">${(data.language||'kn').toUpperCase()}</span>
        <span style="margin-left:8px; font-size:0.75rem; padding:2px 6px; border-radius:10px; background:${data.priority === 'critical' ? '#da3633' : data.priority === 'urgent' ? '#f0883e' : '#238636'}; color:#fff;">${(data.priority||'normal').toUpperCase()}</span>
      `;
      card.addEventListener('click', () => socket.emit('join_room', { call_id: data.call_id }));
      callList.innerHTML = '';
      callList.appendChild(card);

      // Show live session
      document.getElementById('live-session').style.display = 'block';

      // Emotion bars
      const emotionEl = document.getElementById('emotion-display');
      emotionEl.innerHTML = ['distress','urgency','anger','fear','confusion'].map(e => {
        const val = Math.round((data[`${e}_score`] || 0) * 100);
        return `<div style="display:flex; align-items:center; gap:8px;">
          <span style="width:70px; font-size:0.78rem; color:#c9d1d9;">${e.charAt(0).toUpperCase()+e.slice(1)}</span>
          <div style="flex:1; height:8px; background:#30363d; border-radius:4px; overflow:hidden;">
            <div style="width:${val}%; height:100%; background:${EMOTION_COLORS[e]}; border-radius:4px; transition:width 0.4s;"></div>
          </div>
          <span style="font-size:0.72rem; color:#8b949e; width:30px; text-align:right;">${val}%</span>
        </div>`;
      }).join('');

      // NLU
      const nluEl = document.getElementById('nlu-display');
      nluEl.innerHTML = `
        <div style="font-size:0.85rem; margin-bottom:4px;"><b style="color:#8b949e;">Intent:</b> ${data.current_intent || data.intent || '—'}</div>
        <div style="font-size:0.85rem; margin-bottom:4px;"><b style="color:#8b949e;">Confidence:</b> ${Math.round((data.confidence_score||0)*100)}%</div>
        <div style="font-size:0.85rem; margin-bottom:4px;"><b style="color:#8b949e;">Verification:</b> ${data.verification_status||'pending'}</div>
        <div style="font-size:0.85rem; margin-bottom:4px;"><b style="color:#8b949e;">Department:</b> ${data.department_routed_to||'—'}</div>
      `;

      // Turns
      const turnsEl = document.getElementById('turns-display');
      const turns = data.turns || [];
      turnsEl.innerHTML = turns.map(t => `
        <div style="padding:4px 0; border-bottom:1px solid #21262d; font-size:0.82rem;">
          <span style="font-weight:700; color:${t.speaker==='citizen'?'#3fb950':t.speaker==='ai'?'#58a6ff':'#f0883e'};">${t.speaker}:</span>
          <span>${t.clean_text || t.text || t.raw_transcript || ''}</span>
          ${t.ai_restatement ? `<div style="color:#8b949e; font-style:italic; font-size:0.78rem;">🔁 ${t.ai_restatement}</div>` : ''}
        </div>
      `).join('');
      turnsEl.scrollTop = turnsEl.scrollHeight;
    }

    // Poll for active sessions
    setInterval(async () => {
      try {
        const res = await fetch('/api/agent/sessions?status=active');
        const sessions = await res.json();
        if (sessions.length > 0) {
          sessions.forEach(s => {
            updateDashboard(s);
            socket.emit('join_room', { call_id: s.call_id });
          });
        }
      } catch (e) {}
    }, 5000);
  </script>

</body>
</html>
